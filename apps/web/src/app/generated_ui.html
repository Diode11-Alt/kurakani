<!-- Micro-interaction Script -->
<script>
        // Subtle hover effect on the form card for glassmorphism movement
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Toggle Password Visibility
        const passInput = document.getElementById('passphrase');
        const passToggle = passInput.nextElementSibling.nextElementSibling;
        passToggle.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            passToggle.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
