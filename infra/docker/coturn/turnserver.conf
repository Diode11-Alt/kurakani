# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
# relay-ip=192.168.100.234
external-ip=192.168.100.234

# Credentials
realm=turn.signal-clone.local
server-name=turn.signal-clone.local
lt-cred-mech
use-auth-secret
static-auth-secret=8f7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e
user=guffuser:guffpass

# TLS (Optional for local dev, but required for prod)
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# Security
no-loopback-peers
no-multicast-peers

# Bandwidth & logging
max-bps=500000
total-quota=100
stale-nonce=600
# log-file=/var/log/turnserver.log
