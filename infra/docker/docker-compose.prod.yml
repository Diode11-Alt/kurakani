version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal_production_password_change_me
      POSTGRES_DB: signal
    volumes:
      - signal_db_data:/var/lib/postgresql/data
    networks:
      - signal-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_change_me
    volumes:
      - signal_minio_data:/data
    networks:
      - signal-net
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    command: >
      --log-file=stdout
      --listening-port=3478
      --listening-ip=0.0.0.0
      --external-ip=$COTURN_EXTERNAL_IP
      --user=signal:signal_turn_secret_change_me
      --realm=signal.local
      --no-tls
      --no-dtls
    network_mode: "host" # CoTURN often needs host networking for UDP hole punching
    restart: unless-stopped

  server:
    build: 
      context: ../../
      dockerfile: apps/server/Dockerfile
    environment:
      - DATABASE_URL=postgresql://signal:signal_production_password_change_me@db:5432/signal
      - JWT_SECRET=production_jwt_secret_change_me
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin_change_me
      - NODE_ENV=production
    depends_on:
      - db
      - minio
    networks:
      - signal-net
    restart: unless-stopped
    ports:
      - "4000:4000"

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://server:4000
      - NEXT_PUBLIC_WS_URL=ws://server:4000
    depends_on:
      - server
    networks:
      - signal-net
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  signal_db_data:
  signal_minio_data:

networks:
  signal-net:
    driver: bridge
