<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Video Call - Secure Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e9e8e9",
                        "surface-container-highest": "#e3e2e3",
                        "inverse-on-surface": "#f2f0f1",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dbdadb",
                        "primary": "#094cb2",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1b1c1d",
                        "primary-fixed-dim": "#b1c5ff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#211b00",
                        "tertiary": "#6d5e00",
                        "surface-tint": "#2259bf",
                        "inverse-surface": "#303031",
                        "secondary-fixed-dim": "#c2c7cc",
                        "tertiary-container": "#bfab49",
                        "surface-bright": "#faf9fa",
                        "on-error": "#ffffff",
                        "primary-container": "#3366cc",
                        "surface-variant": "#e3e2e3",
                        "on-primary-fixed": "#001946",
                        "background": "#faf9fa",
                        "on-secondary-fixed": "#171c20",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#434653",
                        "inverse-primary": "#b1c5ff",
                        "on-primary-container": "#e7ebff",
                        "on-secondary-container": "#606569",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#dcc661",
                        "tertiary-fixed": "#f9e37a",
                        "outline-variant": "#c3c6d5",
                        "on-secondary-fixed-variant": "#42474b",
                        "surface": "#faf9fa",
                        "primary-fixed": "#d9e2ff",
                        "secondary-fixed": "#dfe3e8",
                        "outline": "#737784",
                        "secondary": "#5a5f63",
                        "on-tertiary-container": "#4a3f00",
                        "surface-container-low": "#f5f3f4",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-background": "#1b1c1d",
                        "secondary-container": "#dfe3e8",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#00419d",
                        "surface-container": "#efedee"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "display": ["Noto Serif", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-inverse-surface text-inverse-on-surface h-screen w-screen overflow-hidden flex flex-col font-body">
<!-- Main Video Area (Immersive) -->
<main class="flex-grow relative bg-black">
<!-- Remote Participant Video Placeholder -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="A sharp, high-resolution portrait of a professional woman looking directly into the camera during a video call. The setting is a minimalist office with subtle, warm lighting that highlights her face. The image is composed to simulate a full-screen, immersive desktop video conference experience, conveying focus and clarity. The aesthetic is clean and modern, matching a high-end corporate or secure communication environment." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDS6Qwk2q4PderVbe2f6nUS2BBkwJxioA-oAlv7g2ebxImq65wmKwmPxJ_ynotLrdr12aX3iCE3SFM5xIaha7VJ18Fnp7PYE4HvbDv3DrfYGXc7hZ1f2xBDkVbraPLnwhTdkqL0qz_sDRJPnMDeKTu4f_uHeS2xOSO9u3oIse8AjEt8527ZWSy8f1Pt7WujSmbKmFghh4k9wv5LYsmkFBc9ieCptZbtYb4NRHgjfi-LsezyQ76mfJRYp3eAPbYDZLOQCxKZubmigBH0');">
</div>
<!-- Self View (Picture-in-Picture) -->
<div class="absolute top-8 right-8 w-64 aspect-video bg-surface-container-highest shadow-2xl overflow-hidden border border-outline-variant/10">
<div class="w-full h-full bg-cover bg-center" data-alt="A sharp, clear webcam view of a professional man in a well-lit home office, serving as the self-view in a video call. The lighting is balanced and natural, highlighting the subject's face against a neutral background. This small picture-in-picture window fits within a larger high-end video conferencing interface, maintaining the crisp, authoritative aesthetic of the application." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCK-6eYXY1KECUglMWxN_rsHx_TSTe87mU696-wxNvF_6otD6ZX8ExK89jUx7NH-4d-UwxWSVscpTXZw3dA6h9JVEAH5InlBfBdngxfNLJWl8vArRjKneJPbiIQAaGUFXFlXOZSmv2gYigMRmdBY40oK_3DZmHMpZYysDGS3N1c60JJbn-F0SetWkVgLPIVlFM9bp-sWtWB1CGnOAs3ABiWtnallViPCrtZMAeU69Sols1q947-nIyLeGC2DxiAQtQTlItsWf7K0bOh');">
</div>
<div class="absolute bottom-2 left-2 bg-inverse-surface/80 px-2 py-1 flex items-center gap-1 backdrop-blur-md">
<span class="material-symbols-outlined text-sm" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
<!-- Security Protocol Overlay -->
<div class="absolute top-8 left-8 bg-inverse-surface/90 px-4 py-3 font-headline text-sm tracking-wide text-tertiary-fixed border-l-2 border-tertiary shadow-lg">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-lg" data-icon="shield_locked" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_locked</span>
<span class="font-bold uppercase tracking-wider">End-to-End Encrypted</span>
</div>
<div class="opacity-80 font-mono text-xs">
                Protocol: AES-256-GCM<br/>
                Key Exhange: X25519<br/>
                Latency: 24ms
            </div>
</div>
<!-- Participant Info -->
<div class="absolute bottom-8 left-8 bg-inverse-surface/80 px-4 py-2 backdrop-blur-md">
<h2 class="font-headline text-xl text-on-primary">Dr. Eleanor Vance</h2>
<p class="font-label text-sm text-secondary-fixed-dim">Chief of Operations</p>
</div>
</main>
<!-- Control Bar (Solid dark slate) -->
<footer class="h-24 bg-inverse-surface border-t border-outline-variant/10 flex items-center justify-between px-8 flex-shrink-0">
<!-- Call Info / Time -->
<div class="flex flex-col text-on-surface-variant font-label">
<span class="text-on-primary font-bold text-lg" id="call-timer">45:12</span>
<span class="text-sm">Meeting Room Alpha</span>
</div>
<!-- Primary Controls -->
<div class="flex items-center gap-6">
<!-- Mute -->
<button class="flex flex-col items-center gap-2 group hover:opacity-80 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-2xl" data-icon="mic_off" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic_off</span>
</div>
<span class="font-label text-xs text-on-secondary-fixed-variant group-hover:text-on-primary transition-colors">Unmute</span>
</button>
<!-- Video -->
<button class="flex flex-col items-center gap-2 group hover:opacity-80 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-2xl" data-icon="videocam" data-weight="fill" style="font-variation-settings: 'FILL' 1;">videocam</span>
</div>
<span class="font-label text-xs text-on-secondary-fixed-variant group-hover:text-on-primary transition-colors">Stop Video</span>
</button>
<!-- Share -->
<button class="flex flex-col items-center gap-2 group hover:opacity-80 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-2xl" data-icon="present_to_all">present_to_all</span>
</div>
<span class="font-label text-xs text-on-secondary-fixed-variant group-hover:text-on-primary transition-colors">Share</span>
</button>
<!-- More -->
<button class="flex flex-col items-center gap-2 group hover:opacity-80 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-2xl" data-icon="more_vert">more_vert</span>
</div>
<span class="font-label text-xs text-on-secondary-fixed-variant group-hover:text-on-primary transition-colors">More</span>
</button>
<!-- End Call (Distinct) -->
<button class="flex flex-col items-center gap-2 group ml-4 hover:scale-105 transition-transform">
<div class="w-16 h-12 rounded-full bg-error flex items-center justify-center text-on-error shadow-lg">
<span class="material-symbols-outlined text-2xl" data-icon="call_end" data-weight="fill" style="font-variation-settings: 'FILL' 1;">call_end</span>
</div>
<span class="font-label text-xs text-error font-bold">End Call</span>
</button>
</div>
<!-- Secondary Controls -->
<div class="flex items-center gap-4">
<button class="text-on-secondary-fixed-variant hover:text-on-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
<span class="font-label text-sm hidden md:inline">Chat</span>
</button>
<button class="text-on-secondary-fixed-variant hover:text-on-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label text-sm hidden md:inline">Participants (2)</span>
</button>
</div>
</footer>
<script>
        // Simple timer logic for demonstration
        let seconds = 2712; // 45:12
        const timerElement = document.getElementById('call-timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerElement.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body></html>
