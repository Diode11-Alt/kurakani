<script>
    // Subtle tilt effect for the glass card
    const card = document.querySelector('.glass-card');
    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });

    // Mock Login Interaction
    const loginBtn = document.querySelector('button');
    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
      setTimeout(() => {
        loginBtn.innerHTML = 'Access Granted <span class="material-symbols-outlined">check_circle</span>';
        loginBtn.classList.remove('bg-primary');
        loginBtn.classList.add('bg-green-600');
      }, 1500);
    });
  </script>
