<script>
        // Micro-interactions for the call duration timer
        let seconds = 252; // 04:12 starting point
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerElement.textContent = `${mins}:${secs}`;
        }

        setInterval(updateTimer, 1000);

        // Basic Draggable Simulation for Local Video
        const localVideo = document.getElementById('local-video-container');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        localVideo.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            if (e.target === localVideo || localVideo.contains(e.target)) {
                isDragging = true;
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, localVideo);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }

        // Toggle functionality simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.querySelector('span').innerText === 'call_end') {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                    return;
                }
                
                const icon = this.querySelector('span');
                const isActive = this.classList.contains('bg-primary');
                
                if (isActive) {
                    this.classList.remove('bg-primary', 'shadow-primary/40');
                    this.classList.add('bg-slate-800/40');
                    icon.style.fontVariationSettings = "'FILL' 0";
                } else if (!this.classList.contains('bg-error')) {
                    this.classList.add('bg-primary', 'shadow-primary/40');
                    this.classList.remove('bg-slate-800/40');
                    icon.style.fontVariationSettings = "'FILL' 1";
                }
            });
        });
    </script>
