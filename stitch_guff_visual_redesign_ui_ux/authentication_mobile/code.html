<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Login</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e9e8e9",
                        "surface-container-highest": "#e3e2e3",
                        "inverse-on-surface": "#f2f0f1",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dbdadb",
                        "primary": "#094cb2",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1b1c1d",
                        "primary-fixed-dim": "#b1c5ff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#211b00",
                        "tertiary": "#6d5e00",
                        "surface-tint": "#2259bf",
                        "inverse-surface": "#303031",
                        "secondary-fixed-dim": "#c2c7cc",
                        "tertiary-container": "#bfab49",
                        "surface-bright": "#faf9fa",
                        "on-error": "#ffffff",
                        "primary-container": "#3366cc",
                        "surface-variant": "#e3e2e3",
                        "on-primary-fixed": "#001946",
                        "background": "#faf9fa",
                        "on-secondary-fixed": "#171c20",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#434653",
                        "inverse-primary": "#b1c5ff",
                        "on-primary-container": "#e7ebff",
                        "on-secondary-container": "#606569",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#dcc661",
                        "tertiary-fixed": "#f9e37a",
                        "outline-variant": "#c3c6d5",
                        "on-secondary-fixed-variant": "#42474b",
                        "surface": "#faf9fa",
                        "primary-fixed": "#d9e2ff",
                        "secondary-fixed": "#dfe3e8",
                        "outline": "#737784",
                        "secondary": "#5a5f63",
                        "on-tertiary-container": "#4a3f00",
                        "surface-container-low": "#f5f3f4",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-background": "#1b1c1d",
                        "secondary-container": "#dfe3e8",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#00419d",
                        "surface-container": "#efedee"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "display": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Public Sans"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col items-center justify-center antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md px-6 py-12 flex flex-col justify-center">
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tight text-on-surface mb-3">Welcome Back</h1>
<p class="font-body text-on-surface-variant text-lg">Sign in to continue your session.</p>
</div>
<form class="space-y-6 bg-surface-container-lowest rounded-xl p-8 outline outline-1 outline-outline-variant/15 shadow-sm">
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="font-label text-sm text-primary hover:text-primary-fixed-dim transition-colors font-semibold" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full py-3 px-4 bg-primary text-on-primary rounded-lg font-label font-bold text-base hover:bg-primary-container hover:text-on-primary-container transition-all shadow-sm active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<div class="mt-12 flex items-center justify-center gap-2 text-tertiary">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">shield_locked</span>
<span class="font-label text-sm font-semibold tracking-wide uppercase">Enterprise Protected</span>
</div>
</main>
</body></html>
