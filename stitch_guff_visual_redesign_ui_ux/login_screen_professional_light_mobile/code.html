<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header / Brand Anchor -->
<!-- Note: TopAppBar nav shell is suppressed per Transactional/Linear screen rules -->
<header class="w-full px-margin-mobile pt-lg pb-md flex justify-between items-center">
<div class="font-headline-md text-headline-md font-bold text-primary tracking-tight">GUFF</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center px-margin-mobile w-full max-w-md mx-auto sm:px-0">
<!-- Typography Anchor -->
<div class="mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface md:font-headline-lg md:text-headline-lg">
                Welcome Back
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                Access your secure workspace.
            </p>
</div>
<!-- Authentication Form -->
<form action="#" class="flex flex-col gap-lg" method="POST" onsubmit="event.preventDefault();">
<!-- Workspace Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Workspace Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant text-[20px] pointer-events-none" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface pl-xl pr-sm py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="email" name="email" placeholder="name@organization.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-baseline">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline focus:outline-none focus:ring-1 focus:ring-primary rounded px-xs" href="#">Reset</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant text-[20px] pointer-events-none" style="font-variation-settings: 'FILL' 0;">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface pl-xl pr-sm py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Area -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded py-md px-lg flex justify-center items-center gap-sm hover:bg-surface-tint active:bg-primary-container active:text-on-primary-container transition-colors shadow-sm" type="submit">
                    Authenticate Session
                    <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">login</span>
</button>
</div>
</form>
</main>
<!-- Footer Meta & Trust Signals -->
<footer class="w-full px-margin-mobile pb-xl pt-lg flex flex-col items-center gap-md mt-auto">
<!-- Verification Layer Status Chip -->
<div class="inline-flex items-center gap-xs bg-surface-container px-sm py-xs rounded verification-layer" title="End-to-End Encrypted Session">
<span class="material-symbols-outlined text-primary text-[14px]" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-mono-sm text-mono-sm text-on-surface-variant uppercase tracking-wider text-[11px]">Enterprise Protected</span>
</div>

<span class="text-outline-variant select-none">•</span>
