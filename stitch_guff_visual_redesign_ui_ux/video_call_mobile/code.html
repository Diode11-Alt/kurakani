<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>GUFF Video Call - Dr. Aris Thorne</title>

                        "on-primary-fixed-variant": "#00419d",
                        "surface-container-highest": "#e3e2e3",
                        "on-secondary-fixed": "#171c20",
                        "primary-container": "#3366cc",

                        "tertiary-container": "#bfab49",
                        "on-primary-container": "#e7ebff",

                        "inverse-surface": "#303031",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dfe3e8",
                        "primary-fixed-dim": "#b1c5ff",
                        "background": "#faf9fa",
                        "secondary": "#5a5f63",
                        "outline-variant": "#c3c6d5",
                        "surface-container-high": "#e9e8e9",
                        "surface": "#faf9fa",
                        "on-secondary-fixed-variant": "#42474b",
                        "on-tertiary-container": "#4a3f00",
                        "on-surface-variant": "#434653",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#d9e2ff",
                        "outline": "#737784",
                        "on-secondary-container": "#606569",
                        "tertiary-fixed-dim": "#dcc661",
                        "secondary-container": "#dfe3e8",
                        "primary": "#094cb2",
                        "secondary-fixed-dim": "#c2c7cc",
                        "surface-container": "#efedee",
                        "tertiary-fixed": "#f9e37a",
                        "surface-container-low": "#f5f3f4",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-tertiary-fixed": "#211b00",
                        "on-primary-fixed": "#001946",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1b1c1d",
                        "inverse-on-surface": "#f2f0f1",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "display": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Public Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(250, 249, 250, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .text-shadow-sm {
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full w-full overflow-hidden bg-black font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Video Background -->
<div class="absolute inset-0 z-0">
<img alt="Dr. Aris Thorne on video call" class="h-full w-full object-cover" data-alt="A cinematic, high-resolution portrait of a distinguished medical researcher in a modern, brightly lit laboratory setting. The lighting is soft and professional, highlighting a sense of authority and clarity consistent with a high-end digital editorial experience. The background features subtle, out-of-focus scientific equipment, emphasizing the subject's expertise. The overall aesthetic is clean, premium, and sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDx35L_LwYsq3ez1BlyR8qdDVUk9rQ4g-CGDsIgWky5LqcnBv99YeSAuwO74eVREzgfLLROUw3eD2gzTIrHah2U5n-JY6XrwPGuY489xO9RZklRWT5Asvqip1UMFwq7T8AymNwA8HK8g2ojDOUDULWtOFfFAmhRCg0kKuG-1_pyIKnoLG2ubhC7TP4tragvkCKeTR7wftwjoi3j6EeFDtMzmtAdS5ISxVUt-Arampst3SgdgEglUBIfXne8htELiALQhdU6UCfTQftJ"/>
<!-- Subtle gradient overlay for better text readability at top and bottom -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
</div>
<!-- Top Technical Header -->
<header class="absolute top-0 left-0 w-full z-10 px-4 py-safe pt-6 pb-4 flex justify-between items-start pointer-events-none">
<div class="flex flex-col gap-1">
<div class="inline-flex items-center gap-1.5 bg-black/40 backdrop-blur-md rounded-full px-2.5 py-1">
<span class="material-symbols-outlined text-[12px] text-emerald-400" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label text-[9px] uppercase tracking-widest text-white/90">End-to-End Encrypted</span>
</div>
</div>
<div class="flex items-center gap-2">
<div class="inline-flex items-center gap-1 bg-black/40 backdrop-blur-md rounded-full px-2.5 py-1">
<div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
<span class="font-label text-[10px] text-white/90 tracking-wider">24ms</span>
</div>
<button class="pointer-events-auto bg-black/40 backdrop-blur-md rounded-full p-1.5 text-white/90 hover:bg-black/60 transition-colors">
<span class="material-symbols-outlined text-[18px]">more_vert</span>
</button>
</div>
</header>
<!-- Caller Info (Bottom Left, above controls) -->
<div class="absolute bottom-32 left-6 z-10 pointer-events-none">
<h1 class="font-headline text-3xl font-bold text-white text-shadow-sm mb-1">Dr. Aris Thorne</h1>
<p class="font-body text-sm font-medium text-white/80 text-shadow-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">science</span>
            Lead Researcher
        </p>
</div>
<!-- PiP (You) -->
<div class="absolute top-20 right-4 z-20 w-28 h-40 rounded-xl overflow-hidden shadow-2xl ring-1 ring-white/20">
<img alt="Your video feed" class="h-full w-full object-cover" data-alt="A focused self-view of a professional in a bright, modern home office. The lighting is even and flat, creating a clean, high-key look suitable for a premium video conferencing interface. The environment suggests a scholarly, curated space with a hint of natural light coming from a window. The styling aligns with a high-end, minimalist editorial layout." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRwgpHg3pFBfPb6cv0lRZZRWyuWk6YINS-vk7k1FAkcgYNRzsrnO2o1q84yMfL6lb-nP0kTUikKEACJXyTVemI03zILcJtRBbtpDqNg4Xj4VOY14Q5oduAcEld9twJET1VPwOZgWMVf6Wx6VSUkLCHdBqZ-LPxtDBKVvGMlB1JNJbJDiDdt2biLfyBaqmgziU6qkNXBbNWj3JDZU0rIXf1WLZzPT6gIHEI1n6wVtHsBDgTFJ-VTb8EPE-NYwfF3jYNpnz2tl15jHJq"/>
</div>
<!-- Bottom Controls Bar -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-30">
<div class="glass-panel rounded-full p-2 flex justify-between items-center shadow-lg ring-1 ring-black/5">
<!-- Mute -->
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface group">
<span class="material-symbols-outlined text-[22px] group-hover:text-primary transition-colors">mic</span>
</button>
<!-- Video -->
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface group">
<span class="material-symbols-outlined text-[22px] group-hover:text-primary transition-colors">videocam</span>
</button>
<!-- Share Screen -->
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface group">
<span class="material-symbols-outlined text-[22px] group-hover:text-primary transition-colors">present_to_all</span>
</button>
<!-- End Call -->
<button class="w-14 h-14 flex items-center justify-center rounded-full bg-error text-on-error hover:bg-error/90 active:scale-95 transition-all shadow-md ml-2">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">call_end</span>
</button>
</div>
</div>
<script>
        // Simple JS to handle button interactions visually
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', function() {
                if(!this.classList.contains('bg-error')) {
                    this.style.transform = 'scale(0.95)';
                }
            });
            btn.addEventListener('mouseup', function() {
                if(!this.classList.contains('bg-error')) {
                    this.style.transform = 'scale(1)';
                }
            });
            btn.addEventListener('mouseleave', function() {
                if(!this.classList.contains('bg-error')) {
                    this.style.transform = 'scale(1)';
                }
            });
        });
    </script>
</body></html>
