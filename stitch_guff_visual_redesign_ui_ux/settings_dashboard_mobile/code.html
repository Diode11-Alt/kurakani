<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600;700&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#ffdad6",
                    "surface-variant": "#e3e2e3",
                    "secondary": "#5a5f63",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#d9e2ff",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#094cb2",
                    "on-secondary-container": "#606569",
                    "on-primary-fixed": "#001946",
                    "surface-container-high": "#e9e8e9",
                    "on-primary": "#ffffff",
                    "outline": "#737784",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#e7ebff",
                    "background": "#faf9fa",
                    "on-surface-variant": "#434653",
                    "primary-fixed-dim": "#b1c5ff",
                    "on-tertiary-fixed": "#211b00",
                    "surface-bright": "#faf9fa",
                    "on-background": "#1b1c1d",
                    "inverse-on-surface": "#f2f0f1",
                    "tertiary-container": "#bfab49",
                    "tertiary": "#6d5e00",
                    "surface-container": "#efedee",
                    "inverse-primary": "#b1c5ff",
                    "tertiary-fixed-dim": "#dcc661",
                    "secondary-fixed": "#dfe3e8",
                    "on-primary-fixed-variant": "#00419d",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#c2c7cc",
                    "surface": "#faf9fa",
                    "on-secondary-fixed-variant": "#42474b",
                    "primary-container": "#3366cc",
                    "on-surface": "#1b1c1d",
                    "on-tertiary-fixed-variant": "#524600",
                    "surface-container-low": "#f5f3f4",
                    "tertiary-fixed": "#f9e37a",
                    "surface-dim": "#dbdadb",
                    "inverse-surface": "#303031",
                    "on-error": "#ffffff",
                    "outline-variant": "#c3c6d5",
                    "surface-container-highest": "#e3e2e3",
                    "on-secondary-fixed": "#171c20",
                    "on-tertiary-container": "#4a3f00",
                    "secondary-container": "#dfe3e8",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#2259bf"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "display": ["Noto Serif"],
                    "body": ["Inter"],
                    "label": ["Public Sans"]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: theme('colors.background'); color: theme('colors.on-background'); }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Noto Serif', serif; }
        .font-label { font-family: 'Public Sans', sans-serif; }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center bg-surface-container-low">
<!-- Mobile Device Mockup -->
<div class="w-full max-w-md h-full md:h-[850px] bg-surface-bright relative shadow-2xl overflow-hidden flex flex-col md:rounded-[2rem] md:border-[8px] md:border-surface-container-high">
<!-- TopAppBar: Settings / Alexandria -->
<header class="flex justify-between items-center px-6 py-4 w-full sticky top-0 z-50 bg-surface-bright dark:bg-surface-dim flat no shadows bg-surface-container-low dark:bg-surface-container-high">
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-surface-variant/50 transition-colors active:opacity-80 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="text-center flex-1">
<h1 class="font-headline text-2xl font-bold tracking-tight text-primary dark:text-inverse-primary italic">Alexandria</h1>
<p class="font-label text-[10px] uppercase tracking-widest text-secondary mt-1">Settings Dashboard</p>
</div>
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-surface-variant/50 transition-colors active:opacity-80 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto pb-24 px-6 pt-4 space-y-8">
<!-- Security Posture Widget (Bento Style) -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/15 flex items-center justify-between">
<div class="flex-1 pr-4">
<h2 class="font-headline text-lg text-on-surface mb-1">Security Posture</h2>
<p class="font-body text-sm text-on-surface-variant leading-relaxed">Your device configurations meet high-end organizational standards. Monitor actively.</p>
</div>
<div class="flex-shrink-0 w-20 h-20 rounded-full bg-surface-container-high flex flex-col items-center justify-center border-4 border-surface-bright relative shadow-inner">
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 36 36">
<path class="text-surface-variant" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2"></path>
<path class="text-primary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="85, 100" stroke-width="2"></path>
</svg>
<span class="font-headline text-2xl font-bold text-primary relative z-10">A-</span>
</div>
</section>
<!-- Configuration Options List -->
<section class="space-y-4">
<h3 class="font-label text-xs uppercase tracking-widest text-secondary mb-2 pl-2">System Configurations</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/15 divide-y divide-surface-container-high/50">
<!-- Account Security -->
<button class="w-full flex items-center px-5 py-4 hover:bg-surface-container/50 transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors group-hover:bg-primary-container/20">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">shield_lock</span>
</div>
<div class="ml-4 flex-1 text-left">
<p class="font-headline text-base text-on-surface">Account Security</p>
<p class="font-body text-xs text-on-surface-variant mt-0.5">Passwords, 2FA, Recovery</p>
</div>
<span class="material-symbols-outlined text-secondary opacity-50 group-hover:opacity-100 group-hover:text-primary transition-all">chevron_right</span>
</button>
<!-- Privacy & Keys -->
<button class="w-full flex items-center px-5 py-4 hover:bg-surface-container/50 transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors group-hover:bg-primary-container/20">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">key</span>
</div>
<div class="ml-4 flex-1 text-left">
<p class="font-headline text-base text-on-surface">Privacy &amp; Keys</p>
<p class="font-body text-xs text-on-surface-variant mt-0.5">Encryption, API tokens</p>
</div>
<span class="material-symbols-outlined text-secondary opacity-50 group-hover:opacity-100 group-hover:text-primary transition-all">chevron_right</span>
</button>
<!-- Node Preferences -->
<button class="w-full flex items-center px-5 py-4 hover:bg-surface-container/50 transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors group-hover:bg-primary-container/20">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">hub</span>
</div>
<div class="ml-4 flex-1 text-left">
<p class="font-headline text-base text-on-surface">Node Preferences</p>
<p class="font-body text-xs text-on-surface-variant mt-0.5">Routing, Local Network</p>
</div>
<span class="material-symbols-outlined text-secondary opacity-50 group-hover:opacity-100 group-hover:text-primary transition-all">chevron_right</span>
</button>
<!-- Notifications -->
<button class="w-full flex items-center px-5 py-4 hover:bg-surface-container/50 transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors group-hover:bg-primary-container/20">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">notifications</span>
</div>
<div class="ml-4 flex-1 text-left">
<p class="font-headline text-base text-on-surface">Notifications</p>
<p class="font-body text-xs text-on-surface-variant mt-0.5">Alerts, Summaries</p>
</div>
<span class="material-symbols-outlined text-secondary opacity-50 group-hover:opacity-100 group-hover:text-primary transition-all">chevron_right</span>
</button>
</div>
</section>
<div class="pt-6 flex justify-center pb-8">
<button class="font-label text-sm text-error hover:underline opacity-80 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">logout</span> Sign Out Device
                </button>
</div>
</main>
<!-- BottomNavBar omitted due to Settings page context (Task-Focused/Details) -->
</div>
</body></html>
